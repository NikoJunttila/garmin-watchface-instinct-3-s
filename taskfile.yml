version: '3'

vars:
  SDK: '{{.HOME}}/.Garmin/ConnectIQ/Sdks/connectiq-sdk-lin-9.2.0-2026-06-09-92a1605b2'
  DEVICE: instinct3solar45mm
  NAME: Nordic
  # TTFs the custom bitmap fonts are rendered from (Noto Sans Condensed, Apache-2.0).
  HERO_TTF: /usr/share/fonts/noto/NotoSans-CondensedBlack.ttf
  LABEL_TTF: /usr/share/fonts/noto/NotoSans-CondensedSemiBold.ttf

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  key:
    desc: Generate the developer signing key (once). Required to compile.
    status:
      - test -f developer_key.der
    cmds:
      - openssl genrsa -out developer_key.pem 4096
      - openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt
      - 'echo "Created developer_key.der"'

  font:
    desc: Regenerate the bitmap fonts from TTFs (needs python3 + Pillow). Output is committed; build does not need this.
    cmds:
      - python3 tools/genfont.py --ttf {{.HERO_TTF}}  --size 56 --chars "0123456789:" --out resources/fonts/nordic_hero --threshold 128 --mono-digits --colon-rise 4
      - python3 tools/genfont.py --ttf {{.LABEL_TTF}} --size 24 --chars "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ .,:%-/" --out resources/fonts/nordic_label --threshold 104
      - python3 tools/genfont.py --ttf {{.LABEL_TTF}} --size 14 --chars "0123456789%" --out resources/fonts/nordic_small --threshold 100

  build:
    desc: Compile the watch face into bin/{{.NAME}}.prg
    deps: [key, clean]
    cmds:
      - mkdir -p bin
      - '{{.SDK}}/bin/monkeyc -d {{.DEVICE}} -f monkey.jungle -o bin/{{.NAME}}.prg -y developer_key.der -w'

  sim:
    desc: Launch the Connect IQ simulator (foreground — run in its own terminal, then `task run` in another)
    env:
      # Hyprland sets QT_QPA_PLATFORM=wayland;xcb; the simulator's bundled Qt is
      # unreliable on the Wayland plugin, so force xcb (uses XWayland via DISPLAY).
      QT_QPA_PLATFORM: xcb
    cmds:
      - '{{.SDK}}/bin/connectiq'

  run:
    desc: Push the built app to the running simulator
    deps: [build]
    cmds:
      - '{{.SDK}}/bin/monkeydo bin/{{.NAME}}.prg {{.DEVICE}}'

  clean:
    desc: Remove build output
    cmds:
      - rm -rf bin

  package:
    desc: Export bin/{{.NAME}}.iq for sharing/publishing on the Connect IQ Store
    deps: [key, clean]
    cmds:
      - mkdir -p bin
      # -e packages a release build for every product in manifest.xml (no -d).
      - '{{.SDK}}/bin/monkeyc -e -f monkey.jungle -o bin/{{.NAME}}.iq -y developer_key.der -r -w'

